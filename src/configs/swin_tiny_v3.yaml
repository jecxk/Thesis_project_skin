experiment_name: swin_tiny_v3
seed: 42
output_dir: outputs/swin_tiny_v3

classes:
  - akiec
  - bcc
  - bkl
  - df
  - mel
  - nv
  - vasc

paths:
  root_dir: .
  csv_file: data/metadata/skin_metadata.csv

model:
  name: swin_tiny_patch4_window7_224
  pretrained: true
  num_classes: 7
  dropout: 0.3

train:
  image_size: 224
  batch_size: 16
  num_workers: 0
  epochs: 50
  amp: true
  grad_clip: 1.0
  early_stopping_patience: 12
  # Mixup / CutMix
  mixup_alpha: 0.2
  cutmix_alpha: 1.0
  mixup_cutmix_prob: 0.5

optimizer:
  name: adamw
  # Swin Transformer cần LR thấp hơn CNN khi fine-tune
  lr: 0.0001
  weight_decay: 0.05

scheduler:
  name: cosine_warmup
  min_lr: 1.0e-6
  warmup_epochs: 5

loss:
  name: cross_entropy
  label_smoothing: 0.1

sampling:
  use_weighted_sampler: true

augmentation:
  train:
    hflip: 0.5
    vflip: 0.5
    rotation: 90
    color_jitter: 0.25
    random_erasing: 0.1
    random_resized_crop: true
    random_resized_crop_scale_min: 0.85
    random_resized_crop_scale_max: 1.0
    gaussian_blur: 0.1
  eval:
    center_crop: false

metric:
  monitor: macro_f1
  mode: max
