# ============================================================================
# ABLATION #1: Bỏ Mixup/CutMix
# ============================================================================
# So với bản gốc (efficientnet_b0_optimized.yaml), file này CHỈ khác ở:
#   - mixup_alpha: 0.0      (gốc: 0.2)
#   - cutmix_alpha: 0.0     (gốc: 1.0)
#   - mixup_cutmix_prob: 0.0 (gốc: 0.5)
#
# Mục đích: Chứng minh Mixup/CutMix giúp giảm overfitting và tăng accuracy.
# Nếu kết quả GIẢM nhiều → Mixup/CutMix rất quan trọng.
# ============================================================================

experiment_name: ablation_no_mixup
seed: 42
output_dir: outputs/ablation_no_mixup

classes: [akiec, bcc, bkl, df, mel, nv, vasc]

paths:
  root_dir: .
  csv_file: data/metadata/skin_metadata.csv

model:
  name: tf_efficientnet_b0
  pretrained: true
  num_classes: 7
  dropout: 0.3

train:
  image_size: 224
  batch_size: 16
  num_workers: 0
  epochs: 50
  amp: true
  grad_clip: 1.0
  early_stopping_patience: 12
  # === THAY ĐỔI: TẮT Mixup/CutMix ===
  mixup_alpha: 0.0
  cutmix_alpha: 0.0
  mixup_cutmix_prob: 0.0

optimizer:
  name: adamw
  lr: 0.0003
  weight_decay: 0.001

scheduler:
  name: cosine_warmup
  min_lr: 1.0e-6
  warmup_epochs: 3

loss:
  name: cross_entropy
  label_smoothing: 0.1

sampling:
  use_weighted_sampler: true

augmentation:
  train:
    hflip: 0.5
    vflip: 0.5
    rotation: 90
    color_jitter: 0.25
    random_erasing: 0.1
    random_resized_crop: true
    random_resized_crop_scale_min: 0.85
    random_resized_crop_scale_max: 1.0
    gaussian_blur: 0.1
  eval:
    center_crop: false

metric:
  monitor: macro_f1
  mode: max
