experiment_name: densenet121_v3
seed: 42
output_dir: outputs/densenet121_v3

classes:
  - akiec
  - bcc
  - bkl
  - df
  - mel
  - nv
  - vasc

paths:
  root_dir: .
  csv_file: data/metadata/skin_metadata.csv

model:
  name: densenet121
  pretrained: true
  num_classes: 7
  # DenseNet đã có regularization tự nhiên từ dense connections
  # nên dropout 0.25 (nhẹ hơn EB0) là đủ
  dropout: 0.25

train:
  image_size: 224
  batch_size: 16
  num_workers: 0
  epochs: 50
  amp: true
  grad_clip: 1.0
  early_stopping_patience: 12
  # Mixup / CutMix — giữ nguyên công thức thành công
  mixup_alpha: 0.2
  cutmix_alpha: 1.0
  mixup_cutmix_prob: 0.5

optimizer:
  name: adamw
  # DenseNet fine-tune tốt hơn với LR hơi thấp hơn
  lr: 0.00025
  weight_decay: 0.001

scheduler:
  name: cosine_warmup
  min_lr: 1.0e-6
  warmup_epochs: 3

loss:
  name: cross_entropy
  label_smoothing: 0.1

sampling:
  use_weighted_sampler: true

augmentation:
  train:
    hflip: 0.5
    vflip: 0.5
    rotation: 90
    color_jitter: 0.25
    random_erasing: 0.1
    random_resized_crop: true
    random_resized_crop_scale_min: 0.85
    random_resized_crop_scale_max: 1.0
    gaussian_blur: 0.1
  eval:
    center_crop: false

metric:
  monitor: macro_f1
  mode: max
